<table class="table table-sm table-borderless table-responsive">

  <tr>
    <td rowspan="6" align="right"><img src="../assets/img/xiangyun_qiu.jpg" style="width:70%"></td>
    <td class="p-1 pr-2 font-weight-bold"><b>Full Name</b></td>
    <td class="p-1 pl-2 font-weight-light text">Xiangyun Qiu</td>
  </tr>

    {% for content in entry.contents %}
      <tr>
        <td class="p-1 pr-2 font-weight-bold"><b>{{ content.name }}</b></td>
        <td class="p-1 pl-2 font-weight-light text">{{ content.value }}</td>
      </tr>
    {% endfor %}
</table>
